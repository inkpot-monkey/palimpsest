web_server:
  bind: 0.0.0.0
  port: 5050
  web_ui: true

templates:
  global:
    regexp:
      reject:
        - 'CAM'
        - 'TS'
        - 'HDCAM'
        - 'TELESYNC'

  tv:
    metainfo_series: yes
    all_series: yes
    thetvdb_lookup: yes
    exists_series:
      - "@MEDIA_PATH@/series"

tasks:
  organize-movies:
    from_transmission:
      host: "@TRANSMISSION_HOST@"
      port: @TRANSMISSION_PORT@
      only_complete: true
    if:
      - "transmission_category == 'movies'": accept
    metainfo_movie: true

    symlink:
      to: "@MEDIA_PATH@/movies/"
      rename: "{{ movie_name|pathscrub }} ({{ movie_year }}){{ location|pathext }}"
      link_type: hard
      existing: ignore

  organize-series:
    template: tv
    from_transmission:
      host: "@TRANSMISSION_HOST@"
      port: @TRANSMISSION_PORT@
      only_complete: true
    manipulate:
      - title:
          replace:
            regexp: '\[Cap\.(\d+)\]'
            format: 'S01E\1'

    symlink:
      to: "@MEDIA_PATH@/series/{{ series_name|pathscrub }}/Season {{ series_season }}/"
      rename: "{{ series_name|pathscrub }} - {{ series_id}}{{ location|pathext }}"
      link_type: hard
      existing: ignore

  get-subtitles-movies:
    priority: 10
    filesystem:
      path: "@MEDIA_PATH@/movies"
      recursive: yes
      regexp: '.*\.(mkv|mp4|avi)$'
    accept_all: yes
    subliminal:
      languages: [@SUBTITLE_LANG@]
      alternatives: [eng]
      providers: [opensubtitles, tvsubtitles]
      exact_match: yes

  get-subtitles-series:
    priority: 11
    filesystem:
      path: "@MEDIA_PATH@/series"
      recursive: yes
      regexp: '.*\.(mkv|mp4|avi)$'
    accept_all: yes
    subliminal:
      languages: [@SUBTITLE_LANG@]
      alternatives: [eng]
      providers: [opensubtitles, tvsubtitles]
      exact_match: yes
