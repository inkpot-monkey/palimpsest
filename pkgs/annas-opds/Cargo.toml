[package]
name = "annas_opds"
version = "0.1.0"
edition = "2021"
description = "OPDS 2.0 JSON proxy for Anna's Archive search/download with EPUB scrubbing and optional Stump scan"
license = "MIT OR Apache-2.0"

[dependencies]
axum = { version = "0.8", features = ["macros", "query"] }
http = "1"
tokio = { version = "1", features = ["fs", "macros", "rt-multi-thread", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zip = { version = "2", default-features = false, features = ["deflate"] }
quick-xml = "0.37"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
tower-http = { version = "0.6", features = ["trace"] }
tower = "0.5"
urlencoding = "2"
anyhow = "1"
regex = "1"

[[bin]]
name = "annas-opds"
path = "src/main.rs"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
