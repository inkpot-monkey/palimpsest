# Cloudflare Worker config for the out-of-band push relay (ADR-0027).
# Values marked <BOOTSTRAP> are filled during the HITL slice-01 setup.
name = "push-relay"
main = "worker/build/worker/shim.mjs"
compatibility_date = "2024-09-23"

# Build the Rust worker to WASM (cargo install worker-build first).
[build]
command = "cd worker && worker-build --release"

# Subscription storage.
[[kv_namespaces]]
binding = "SUBS"
id = "<BOOTSTRAP: wrangler kv namespace create SUBS>"

# Non-secret config. Secrets (VAPID_PRIVATE, PUBLISH_TOKEN) are NOT here —
# they are set with `wrangler secret put` by the deploy recipe (from sops).
[vars]
VAPID_PUBLIC = "<BOOTSTRAP: base64url of the 65-byte VAPID public key>"
VAPID_SUBJECT = "mailto:admin@palebluebytes.space"

# Serve at push.<domain> as a worker-managed custom domain (dnscontrol IGNOREs it).
[[routes]]
pattern = "push.palebluebytes.space"
custom_domain = true
