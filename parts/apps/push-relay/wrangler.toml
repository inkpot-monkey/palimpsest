# Cloudflare Worker config for the out-of-band push relay (ADR-0027).
name = "push-relay"
main = "worker/build/worker/shim.mjs"
compatibility_date = "2024-09-23"

# Build the Rust worker to WASM (cargo install worker-build first).
[build]
command = "cd worker && worker-build --release"

# Dead-man's switch (ADR-0027 / issue 06): runs the `scheduled` handler every
# 5 min to check rk1b's heartbeat and alert the phone on silence (a full-site
# blackout the out-of-band push itself can't catch). 5 min ≈ 3 ticks before the
# 15-min stale threshold; also keeps KV writes under the free-plan 1000/day cap.
[triggers]
crons = ["*/5 * * * *"]

# Subscription storage (also holds heartbeat:<host> + deadman:<host> state keys).
[[kv_namespaces]]
binding = "SUBS"

# Non-secret config. VAPID_PRIVATE + PUBLISH_TOKEN are set with `wrangler secret put`,
# and VAPID_PUBLIC is injected as `--var` at deploy — all three come from sops
# (monitoring.yaml), so nothing secret or per-deploy is committed here.
[vars]
VAPID_SUBJECT = "mailto:admin@palebluebytes.space"

# Serve at push.<domain> as a worker-managed custom domain (dnscontrol IGNOREs it).
[[routes]]
pattern = "push.palebluebytes.space"
custom_domain = true
